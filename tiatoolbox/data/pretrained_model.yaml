fcn-tissue_mask:
    hf_repo_id: TIACentre/TIAToolbox_pretrained_weights
    architecture:
        class: unet.UNetModel
        kwargs:
            num_input_channels: 3
            num_output_channels: 2
            encoder: "resnet50"
            decoder_block: [3]
    ioconfig:
        class: io_config.IOSegmentorConfig
        kwargs:
            input_resolutions:
                - {'units': 'mpp', 'resolution': 2.0}
            output_resolutions:
                - {'units': 'mpp', 'resolution': 2.0}
            patch_input_shape: [1024, 1024]
            patch_output_shape: [512, 512]
            stride_shape: [450, 450]
            save_resolution: {'units': 'mpp', 'resolution': 8.0}

fcn_resnet50_unet-bcss:
    hf_repo_id: TIACentre/TIAToolbox_pretrained_weights
    architecture:
        class: unet.UNetModel
        kwargs:
            num_input_channels: 3
            num_output_channels: 5
            encoder: "resnet50"
            decoder_block: [3, 3]
    ioconfig:
        class: io_config.IOSegmentorConfig
        kwargs:
            input_resolutions:
                - {'units': 'mpp', 'resolution': 0.25}
            output_resolutions:
                - {'units': 'mpp', 'resolution': 0.25}
            patch_input_shape: [1024, 1024]
            patch_output_shape: [512, 512]
            stride_shape: [450, 450]
            save_resolution: {'units': 'mpp', 'resolution': 0.25}

unet_tissue_mask_tsef:
    hf_repo_id: TIACentre/TIAToolbox_pretrained_weights
    description: >
      These weights can be used to segment a grayscale image to
      create a tissue mask excluding the fatty region. TSEF stands for tissue
      segmentation excluding fat.
    architecture:
        class: unet.UNetModel
        kwargs:
            num_input_channels: 3
            num_output_channels: 3
            encoder: "resnet50"
            decoder_block: [3, 3]
    ioconfig:
        class: io_config.IOSegmentorConfig
        kwargs:
            input_resolutions:
                - {'units': 'baseline', 'resolution': 1.0}
            output_resolutions:
                - {'units': 'baseline', 'resolution': 1.0}
            patch_input_shape: [1024, 1024]
            patch_output_shape: [512, 512]
            stride_shape: [256, 256]
            save_resolution: {'units': 'baseline', 'resolution': 1.0}

hovernet_fast-pannuke:
    hf_repo_id: TIACentre/TIAToolbox_pretrained_weights
    architecture:
        class: hovernet.HoVerNet
        kwargs:
            num_types: 6
            mode: "fast"
            nuc_type_dict: {
                0: "Background",
                1: "Neoplastic",
                2: "Inflammatory",
                3: "Connective",
                4: "Dead",
                5: "Non-Neoplastic Epithelial",
            }
    ioconfig:
        class: io_config.IOInstanceSegmentorConfig
        kwargs:
            input_resolutions:
                - {"units": "mpp", "resolution": 0.25}
            output_resolutions:
                - {"units": "mpp", "resolution": 0.25}
                - {"units": "mpp", "resolution": 0.25}
                - {"units": "mpp", "resolution": 0.25}
            margin: 128
            tile_shape: [1024, 1024]
            patch_input_shape: [256, 256]
            patch_output_shape: [164, 164]
            stride_shape: [164, 164]
            save_resolution: {'units': 'mpp', 'resolution': 0.25}

