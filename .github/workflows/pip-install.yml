name: pip Install

on:
  push:
    paths:
      - "requirements*.yml"
      - "conda-env-create.yml"
      - "requirements/requirement*.txt"
      - "setup*py"
      - "setup*cfg"
      - "pyproject*toml"
      - "MANIFEST*in"
      - ".github/workflows/pip-install.yml"
  pull_request:
    paths:
      - "requirements*.yml"
      - "conda-env-create.yml"
      - "requirements/requirement*.txt"
      - "setup*py"
      - "setup*cfg"
      - "pyproject*toml"
      - "MANIFEST*in"
      - ".github/workflows/pip-install.yml"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-24.04, windows-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        channels: conda-forge
        channel-priority: strict
        auto-update-conda: true

    - name: Create conda environment with correct Python
      shell: bash -l
      run: |
        conda create -y -n test-env python=${{ matrix.python-version }}
        conda activate test-env
        conda install -y openjpeg sqlite

    - name: Verify SQLite
      shell: bash -l
      run: |
        conda activate test-env
        sqlite3 --version
        sqlite3 ":memory:" -list ".output stdout" "pragma compile_options" ".exit"

    - name: Verify OpenJPEG
      shell: bash -l
      run: |
        conda activate test-env
        opj_dump -h || true

    - name: Install CPU-only PyTorch
      shell: bash -l
      run: |
        conda activate test-env
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install tiatoolbox from GitHub
      shell: bash -l
      run: |
        conda activate test-env
        pip install git+https://github.com/TissueImageAnalytics/tiatoolbox@${GITHUB_SHA}

    - name: Test Imports
      shell: bash -l
      run: |
        conda activate test-env
        python - << 'EOF'
        import tiatoolbox
        print("tiatoolbox:", tiatoolbox.__version__)
        import openslide
        print("openslide:", openslide.__version__)
        import torch
        print("torch:", torch.__version__)
        EOF
