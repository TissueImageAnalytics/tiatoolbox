# This workflow will install the package as is on the GitHub default branch using pip

name: pip Install

on:
  push:
    paths:
      - "requirements*.yml"
      - "conda-env-create.yml"
      - "requirements/requirement*.txt"
      - "setup*py"
      - "setup*cfg"
      - "pyproject*toml"
      - "MANIFEST*in"
      - ".github/workflows/pip-install.yml"
  pull_request:
    paths:
      - "requirements*.yml"
      - "conda-env-create.yml"
      - "requirements/requirement*.txt"
      - "setup*py"
      - "setup*cfg"
      - "pyproject*toml"
      - "MANIFEST*in"
      - ".github/workflows/pip-install.yml"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-24.04, windows-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        auto-update-conda: true
        activate-environment: test-env
        environment-file: ""
        channels: conda-forge
        channel-priority: strict

    - name: Install OpenJPEG + SQLite via conda
      shell: bash
      run: |
        conda install -y -c conda-forge openjpeg sqlite
        conda list | grep -E "openjpeg|sqlite"

    - name: Verify SQLite
      shell: bash
      run: |
        sqlite3 --version
        sqlite3 ":memory:" -list ".output stdout" "pragma compile_options" ".exit"

    - name: Verify OpenJPEG
      shell: bash
      run: |
        opj_dump -h || true

    - name: Install CPU-only PyTorch
      shell: bash
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: pip Install From GitHub Repo
      shell: bash
      run: |
        pip install git+https://github.com/TissueImageAnalytics/tiatoolbox@${GITHUB_SHA}

    - name: Test Imports
      shell: python
      run: |
        import tiatoolbox
        print(tiatoolbox.__version__)
        import openslide
        print(openslide.__version__)
        import torch
        print(torch.__version__)
